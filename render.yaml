services:
  - type: web
    name: interviewprep-backend
    runtime: java
    rootDir: backend
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/backend-0.0.1-SNAPSHOT.jar
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: PORT
        value: 10000
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: AI_CONNECT_TIMEOUT_MS
        value: 15000
      - key: AI_REQUEST_TIMEOUT_MS
        value: 30000
      - key: AI_MAX_RETRIES
        value: 2
      - key: AUTH_RATE_LIMIT_PER_MINUTE
        value: 20
      - key: AI_RATE_LIMIT_PER_MINUTE
        value: 12
      - key: GENERAL_RATE_LIMIT_PER_MINUTE
        value: 120
      - key: JWT_EXPIRATION_MS
        value: 86400000
